services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: berdikari
      POSTGRES_USER: berdikari
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berdikari"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: berdikari
      MINIO_ROOT_PASSWORD: secret123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./berdikari-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./berdikari-api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Berdikari
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://berdikari.test
      APP_LOCALE: id
      APP_FALLBACK_LOCALE: id
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: berdikari
      DB_USERNAME: berdikari
      DB_PASSWORD: secret
      SESSION_DRIVER: redis
      SESSION_LIFETIME: "120"
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: noreply@berdikari.test
      MAIL_FROM_NAME: Berdikari ERP
      AWS_ACCESS_KEY_ID: berdikari
      AWS_SECRET_ACCESS_KEY: secret123
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: berdikari
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      AWS_ENDPOINT: http://minio:9000
      FRONTEND_URL: http://localhost:3000

  # Nginx reverse proxy: exposes berdikari.test on port 80 → forwards to api:8000.
  # Host setup (one-time): add `127.0.0.1 berdikari.test` to /etc/hosts.
  nginx:
    image: nginx:alpine
    ports:
      - "8089:80"
    volumes:
      - ./berdikari-api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  web:
    build:
      context: ./berdikari-web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-facing base (host-reachable). Used for client-side requests.
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api
      # SSR-facing base (container-internal). Used by the Nuxt server to reach
      # the API during server-side rendering (e.g. hydrating the auth user).
      NUXT_API_BASE_SERVER: http://api:8000/api
    volumes:
      - ./berdikari-web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  api_vendor:
  web_node_modules:
