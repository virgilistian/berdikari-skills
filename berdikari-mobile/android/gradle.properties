# Kept low deliberately: builds also run in memory-constrained containers
# (2-3 GB total) via Docker, not just full dev machines/CI runners.
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=96m -XX:+HeapDumpOnOutOfMemoryError
# Each build already runs in a fresh --rm container, so a persistent daemon
# never gets reused across invocations — only adds startup/memory overhead.
org.gradle.daemon=false
# Running Kotlin compilation inside the Gradle JVM (instead of a separate
# Kotlin daemon process) and capping worker parallelism keeps peak memory
# usage from stacking multiple JVMs at once in low-memory containers.
org.gradle.workers.max=1
org.gradle.parallel=false
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
